name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Syntax & import check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install requests[socks] beautifulsoup4 python-dotenv stem

      - name: Syntax check
        run: python3 -m py_compile sicry.py && echo "syntax OK"

      - name: Import check
        run: python3 -c "import sicry; print('sicry', sicry.__version__, 'imported OK')"

      - name: Tools schema (no Tor needed)
        run: python3 sicry.py tools --format openai | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d),'tools OK')"
